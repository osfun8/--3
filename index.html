<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skb</title>
    <link rel="stylesheet" href="./backend/css/normolize.css">
    <link rel="stylesheet" href="./backend/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <a href="#" class="header__link"><img src="./backend/img/logo.png" alt="лого" class="header__img"></a>
        <input type="text" class="header__search" placeholder="Введите запрос">
    </header>
    <main class="main">
        <h1 class="main__title">Клиенты</h1>
        <table class="main__table">
<thead>
    <tr>
        <th class="main__hcol" data-sort="id">ID</th>
<th class="main__hcol" data-sort="fio">
    Фамилия Имя Отчество <span class="sort-alphabet">А-Я</span><span class="sort-icon"></span>
</th>

        <th class="main__hcol" data-sort="createdAt">Дата и время<br>создания</th>
        <th class="main__hcol" data-sort="updatedAt">Последние<br>изменения</th>
        <th>Контакты</th>
        <th>Действия</th>
    </tr>
</thead>

        </table>
        <div class="main__load"></div>
        <button class="main__btn"> <svg  width="23" height="16" viewBox="0 0 23 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.5 8C16.71 8 18.5 6.21 18.5 4C18.5 1.79 16.71 0 14.5 0C12.29 0 10.5 1.79 10.5 4C10.5 6.21 12.29 8 14.5 8ZM5.5 6V3H3.5V6H0.5V8H3.5V11H5.5V8H8.5V6H5.5ZM14.5 10C11.83 10 6.5 11.34 6.5 14V16H22.5V14C22.5 11.34 17.17 10 14.5 10Z" fill="#9873FF"/>
          </svg>
           <span>Добавить клиента</span></button>

    </main>



<div class="modal-overlay" id="deleteModal">
  <div class="modal-content">
    <button class="modal-close-btn" id="modalCloseX">&times;</button>
    
    <h3 class="modal-title">Удалить клиента</h3>
    <p class="modal-text">Вы действительно хотите удалить данного клиента?</p>
    
    <button class="modal-delete-btn" id="modalConfirmDelete">Удалить</button>
    <button class="modal-cancel-btn" id="modalCancelBtn">Отмена</button>
  </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
